<!DOCTYPE html><html lang="en"><meta charset="UTF-8">
<title>TS</title>
<script src="https://unpkg.com/lightweight-charts@4.2.1/dist/lightweight-charts.standalone.production.js"></script>
<style>html,body{margin:0;overflow:hidden;background:#131722;width:1920px;height:1080px}#c{width:1920px;height:1080px}</style>
<div id=c></div>
<script>
const D=__DATA__,C=D.candles,c0=C[0].time,cE=C[C.length-1].time;
const ch=LightweightCharts.createChart(document.getElementById('c'),{
 layout:{background:{color:'#131722'},textColor:'#d1d4dc',fontSize:12},
 width:1920,height:1080,
 grid:{vertLines:{color:'#1e222d'},horzLines:{color:'#1e222d'}},
 timeScale:{borderColor:'#2a2e39',timeVisible:true,secondsVisible:false},
 rightPriceScale:{borderColor:'#2a2e39',scaleMargins:{top:.05,bottom:.08}},
 handleScroll:false,handleScale:false
});
function ls(p,c,s){let l=ch.addLineSeries({color:c,lineWidth:1,lineStyle:s||LightweightCharts.LineStyle.Solid,lastValueVisible:false,priceFormat:{type:'custom',formatter:()=>''}});l.setData([{time:c0,value:p},{time:cE,value:p}]);return l}


const ms=ch.addCandlestickSeries({upColor:'#089981',downColor:'#f23645',borderUpColor:'#089981',borderDownColor:'#f23645',wickUpColor:'#089981',wickDownColor:'#f23645'});
ms.setData(C);
const eT=C[D.entryBar].time;

// CBDR
if(D.cbdrHigh!=null&&D.cbdrLow!=null&&D.cbdrHigh>D.cbdrLow){
 ls(D.cbdrHigh,'#c9a84c',LightweightCharts.LineStyle.Dashed);
 ls(D.cbdrLow,'#c9a84c',LightweightCharts.LineStyle.Dashed);
}
// FVG — rays from fvgBarIndex to right
if(D.fvgTop!=null&&D.fvgBottom!=null&&D.fvgBarIndex>=0&&D.fvgBarIndex<C.length){
 let fc=D.fvgDirection==='bearish'?'#f23645':'#089981';
 let lbl=D.fvgDirection==='bearish'?'FVG ↓':'FVG ↑';
 let fm=(D.fvgTop+D.fvgBottom)/2;
 let fvgStart=C[D.fvgBarIndex].time;
 let fvgEnd=C[C.length-1].time;
 let fvgTopLine=ch.addLineSeries({color:fc,lineWidth:1,lineStyle:LightweightCharts.LineStyle.Dashed,lastValueVisible:false,priceFormat:{type:'custom',formatter:()=>''}});
 fvgTopLine.setData([{time:fvgStart,value:D.fvgTop},{time:fvgEnd,value:D.fvgTop}]);
 let fvgBotLine=ch.addLineSeries({color:fc,lineWidth:1,lineStyle:LightweightCharts.LineStyle.Dashed,lastValueVisible:false,priceFormat:{type:'custom',formatter:()=>''}});
 fvgBotLine.setData([{time:fvgStart,value:D.fvgBottom},{time:fvgEnd,value:D.fvgBottom}]);
 ms.createPriceLine({price:fm,color:'transparent',lineWidth:0,axisLabelVisible:true,title:lbl});
}

// Markers
let markers=[];
// Initial SL/TP at entry bar
if(D.initialSlPrice!=null){
 let p=D.side==='long'?'belowBar':'aboveBar';
 markers.push({time:eT,position:p,color:'#f23645',shape:p==='belowBar'?'arrowDown':'arrowUp',text:'SL '+D.initialSlPrice.toFixed(1),size:1});
}
if(D.initialTpPrice!=null){
 let p=D.side==='long'?'aboveBar':'belowBar';
 markers.push({time:eT,position:p,color:'#089981',shape:p==='aboveBar'?'arrowUp':'arrowDown',text:'TP '+D.initialTpPrice.toFixed(1),size:1});
}
(D.trailSteps||[]).forEach(function(s){
 if(s.bar<0||s.bar>=C.length)return;
 let t=C[s.bar].time,side=s.sl<D.entryPrice?'belowBar':'aboveBar';
 markers.push({time:t,position:side,color:'#c9a84c',shape:side==='belowBar'?'arrowDown':'arrowUp',text:'→'+s.sl.toFixed(1),size:1});
});
markers.push({time:eT,position:D.side==='long'?'belowBar':'aboveBar',color:'#ffffff',shape:'arrowUp',text:D.entryPrice.toFixed(1),size:2});
if(D.exitPrice!=null)markers.push({time:cE,position:'inBar',color:D.exitReason==='SL'?'#f23645':'#089981',shape:'circle',text:'X '+D.exitPrice.toFixed(1),size:1.5});
ms.setMarkers(markers);

// Auto-pan: fit then add 4 bars right padding
ch.timeScale().fitContent();
let vr=ch.timeScale().getVisibleLogicalRange();
if(vr)ch.timeScale().setVisibleLogicalRange({from:vr.from,to:vr.to+4});

document.getElementById('c').setAttribute('data-rendered','1');
</script>
</html>
