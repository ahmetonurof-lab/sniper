<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>NEXUS — Canlı Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d0d;color:#e0e0e0;font-family:'Courier New',monospace;font-size:16px}
.dash{padding:16px}

.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #1e1e1e}
.logo{font-size:25px;font-weight:700;color:#7ecfb0;letter-spacing:3px}
.badge-live{background:#0d2018;color:#7ecfb0;border:1px solid #7ecfb0;font-size:12.5px;padding:2px 8px;border-radius:3px;letter-spacing:1px}
.badge-err{background:#1e1010;color:#c97a7a;border:1px solid #c97a7a;font-size:12.5px;padding:2px 8px;border-radius:3px}
.updated{font-size:13px;color:#999}

.stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:16px}
.stat{background:#111;border:1px solid #1e1e1e;border-radius:6px;padding:10px 14px}
.stat-label{font-size:12.5px;color:#e0e0e0;letter-spacing:1px;margin-bottom:4px}
.stat-value{font-size:25px;font-weight:700}

/* Full-width coin grid */
.coins-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}

/* KART */
.card{background:#111;border:1px solid #1e1e1e;border-radius:6px;padding:12px;border-left:3px solid #2a2a2a}
.card.c-short{border-left-color:#c97a7a}
.card.c-long {border-left-color:#7ecfb0}
.card.c-wait {border-left-color:#c9a84c}
.card.c-idle {border-left-color:#2a2a2a}

.card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.card-name{font-size:16px;font-weight:700;color:#e0e0e0}
.card-name span{color:#888;font-size:12.5px}

.bdg{font-size:11px;padding:2px 7px;border-radius:3px;letter-spacing:.5px;white-space:nowrap;font-weight:600}
.bdg-os{background:#1e1010;color:#c97a7a;border:1px solid #c97a7a}
.bdg-ol{background:#0e1a14;color:#7ecfb0;border:1px solid #7ecfb0}
.bdg-ew{background:#1a1810;color:#c9a84c;border:1px solid #c9a84c}
.bdg-sw{background:#0e1a14;color:#7ecfb0;border:1px solid #507a68}
.bdg-id{background:#1a1a1a;color:#888;border:1px solid #2a2a2a}
.bdg-ar{background:#18101a;color:#b088cc;border:1px solid #7a48aa}

.row{display:flex;justify-content:space-between;align-items:baseline;font-size:12.5px;margin-bottom:4px}
.k{color:#888;min-width:80px;flex-shrink:0;font-size:11px;letter-spacing:.5px}
.v{color:#aaa;text-align:right}

/* colors */
.v-bear{color:#c97a7a}
.v-bull{color:#7ecfb0}
.v-hl  {color:#c9a84c}
.v-mt  {color:#888}
.v-wh  {color:#e0e0e0;font-weight:700}
.v-sl  {color:#c97a7a;font-weight:700}
.v-tp  {color:#7ecfb0;font-weight:700}
.v-gr  {color:#7ecfb0}
.v-rd  {color:#c97a7a}
.v-yw  {color:#c9a84c}
.v-pu  {color:#b088cc}

.sep{border-top:1px solid #1a1a1a;margin:7px 0}

.tags{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap;min-height:18px}
.tag{font-size:11px;padding:1px 6px;border-radius:3px}
.tag-tr{background:#1a1800;color:#c9a84c;border:1px solid #3a3010}
.tag-ar{background:#180e1e;color:#b088cc;border:1px solid #4a2860}
.tag-rt{background:#0e1818;color:#7ecfb0;border:1px solid #2a5a4a}

.bar{margin-top:8px;height:3px;background:#1e1e1e;border-radius:2px;position:relative}
.dot{position:absolute;top:-2px;width:7px;height:7px;border-radius:50%;background:#c9a84c;transform:translateX(-50%)}

.err-bar{background:#1e1010;border:1px solid #c97a7a;border-radius:6px;padding:8px 12px;margin-bottom:12px;font-size:13px;color:#c97a7a;display:none}

/* upnl inline in card */
.upnl-row{display:flex;justify-content:space-between;align-items:baseline;font-size:12.5px;margin-bottom:4px}
</style>
</head>
<body>
<div class="dash">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:12px">
      <span class="logo">NEXUS</span>
      <span id="lb" class="badge-live">CANLI</span>
    </div>
    <span class="updated" id="ua">Bekleniyor…</span>
  </div>

  <div id="eb" class="err-bar">live_state.json okunamadi — bot calisiyor mu?</div>

  <div class="stats-row">
    <div class="stat"><div class="stat-label">AVBL BALANCE</div><div class="stat-value v-gr" id="sab">—</div></div>
    <div class="stat"><div class="stat-label">BALANCE</div><div class="stat-value v-gr" id="sb">—</div></div>
    <div class="stat"><div class="stat-label">ACIK POZISYON</div><div class="stat-value v-yw" id="so">—</div></div>
    <div class="stat"><div class="stat-label">BUGUN ISLEM</div><div class="stat-value" style="color:#e0e0e0" id="st">—</div></div>
    <div class="stat"><div class="stat-label">UPNL</div><div class="stat-value" id="su">—</div></div>
  </div>

  <div class="coins-grid" id="cg"></div>
</div>

<script>
const SF='live_state.json', PM=15000;
const $=id=>document.getElementById(id);
const fmt=v=>v!=null?Number(v).toLocaleString('en-US',{maximumFractionDigits:6}):'—';
const fp=v=>v==null?'—':(v>=0?'+$':'-$')+Math.abs(v).toFixed(2);
const pct=(lo,hi)=>lo&&hi&&hi>lo?(((hi-lo)/lo)*100).toFixed(2):'0.00';

/* Priority sort: open trade > entry waiting (fvg_ready+sweep) > sweep detected > cbdr locked */
function priority(s){
  if(s.active_trade) return 0;
  if(s.retrade_armed) return 1;
  if(s.sweep_confirmed && s.fvg_ready) return 2;
  if(s.sweep_confirmed) return 3;
  if(s.cbdr_locked) return 4;
  return 5;
}

function stateInfo(s){
  if(s.active_trade){
    return s.active_trade.side==='short'
      ?{lbl:'OPEN SHORT',bc:'bdg-os',cc:'c-short'}
      :{lbl:'OPEN LONG', bc:'bdg-ol', cc:'c-long'};
  }
  if(s.retrade_armed) return {lbl:'RETRADE ARMED',bc:'bdg-ar',cc:'c-wait'};
  if(s.sweep_confirmed && s.fvg_ready) return {lbl:'ENTRY BEKLIYOR',bc:'bdg-ew',cc:'c-wait'};
  if(s.sweep_confirmed) return {lbl:'SWEEP DETECTED',bc:'bdg-sw',cc:'c-wait'};
  if(s.cbdr_locked) return {lbl:'CBDR KILITLI',bc:'bdg-id',cc:'c-idle'};
  return {lbl:'BEKLENIYOR',bc:'bdg-id',cc:'c-idle'};
}

/* SWEEP value: direction in white, @ level in white */
function swHtml(s){
  if(!s.sweep_confirmed||!s.sweep_direction) return '<span class="v-mt">—</span>';
  const bear=s.sweep_direction==='bearish';
  // direction keyword in white
  const dir=`<span class="v-wh">${bear?'BEARISH':'BULLISH'}</span>`;
  const lvl=s.sweep_level?` <span class="v-wh">@ ${fmt(s.sweep_level)}</span>`:'';
  return dir+lvl;
}

function biasHtml(s){
  const b=(s.bias||'').toUpperCase();
  if(b==='BEARISH'||b==='SHORT') return '<span class="v-bear">SHORT</span>';
  if(b==='BULLISH'||b==='LONG') return '<span class="v-bull">LONG</span>';
  return '<span class="v-mt">NEUTRAL</span>';
}

/* FVG range: prefer active_trade fvg, else sweep indicates scanning */
function fvgHtml(s){
  const t=s.active_trade;
  if(t&&t.fvg_bottom!=null&&t.fvg_top!=null){
    const size=pct(t.fvg_bottom,t.fvg_top);
    return `<span class="v-wh">${fmt(t.fvg_bottom)} – ${fmt(t.fvg_top)}</span> <span class="v-hl">(%${size})</span>`;
  }
  if(t) return '<span class="v-gr">ISLEMDE</span>';
  if(s.sweep_confirmed) return '<span class="v-mt">TARANIYOR</span>';
  return '<span class="v-mt">—</span>';
}

/* Entry: if active_trade exists show entry_time (if present) + entry price */
function entryHtml(t){
  if(!t) return '<span class="v-mt">—</span>';
  let datePart='';
  if(t.entry_time){
    const d=new Date(t.entry_time);
    const dd=String(d.getDate()).padStart(2,'0');
    const mm=String(d.getMonth()+1).padStart(2,'0');
    const yy=String(d.getFullYear()).slice(2);
    const hh=String(d.getHours()).padStart(2,'0');
    const min=String(d.getMinutes()).padStart(2,'0');
    datePart=`<span class="v-mt">${dd}.${mm}.${yy}-${hh}:${min}</span> `;
  }
  return `${datePart}<span class="v-wh">${fmt(t.entry)}</span>`;
}

/* Premium/Discount: where is entry relative to CBDR range */
function premDiscHtml(s){
  const t=s.active_trade;
  if(!t||t.entry==null||!s.cbdr_low||!s.cbdr_high) return '<span class="v-mt">—</span>';
  const lo=s.cbdr_low, hi=s.cbdr_high, en=t.entry;
  const range=hi-lo;
  if(range<=0) return '<span class="v-mt">—</span>';
  const posInRange=((en-lo)/range)*100;
  const label=posInRange>=50?'PREMIUM':'DISCOUNT';
  const cls=posInRange>=50?'v-bear':'v-bull';
  return `<span class="${cls}">${label} %${posInRange.toFixed(1)}</span>`;
}

/* FVG-SL distance: buf / fvg_boundary * 100
   For SHORT: buf = sl - fvg_top,  fvg_boundary = fvg_top
   For LONG:  buf = fvg_bottom - sl, fvg_boundary = fvg_bottom */
function fvgSlHtml(t){
  if(!t||t.fvg_top==null||t.fvg_bottom==null||t.sl==null) return '<span class="v-mt">—</span>';
  let buf, boundary;
  if(t.side==='short'){
    buf=t.sl-t.fvg_top;
    boundary=t.fvg_top;
  } else {
    buf=t.fvg_bottom-t.sl;
    boundary=t.fvg_bottom;
  }
  if(!boundary) return '<span class="v-mt">—</span>';
  const dist=(buf/boundary)*100;
  const cls=dist<0?'v-rd':'v-yw';
  return `<span class="${cls}">%${dist.toFixed(2)}</span>`;
}

function dotLeft(s){
  const lo=s.cbdr_low,hi=s.cbdr_high;
  if(!lo||!hi||hi<=lo) return 50;
  const t=s.active_trade;
  const ref=t?t.entry:s.sweep_level?s.sweep_level:(lo+hi)/2;
  return Math.max(2,Math.min(98,((ref-lo)/(hi-lo))*100));
}

function buildCard(name,s){
  const {lbl,bc,cc}=stateInfo(s);
  const t=s.active_trade;

  /* UPNL row — shown for open positions */
  const upnlRow=t&&t.upnl!=null
    ?`<div class="row"><span class="k">UPNL</span><span class="${t.upnl>=0?'v-gr':'v-rd'}">${fp(t.upnl)}</span></div>`
    :'';

  /* Tags */
  const tags=[];
  if(t&&t.trailing_count>0) tags.push(`<span class="tag tag-tr">TRAIL: ${t.trailing_count}</span>`);
  if(t&&t.is_retrade) tags.push(`<span class="tag tag-rt">RETRADE</span>`);
  if(!t&&s.retrade_armed) tags.push(`<span class="tag tag-ar">ARMED: ${(s.retrade_side||'').toUpperCase()}</span>`);

  return `<div class="card ${cc}">
  <div class="card-head">
    <span class="card-name">${name.replace('USDT','')}<span>USDT</span></span>
    <span class="bdg ${bc}">${lbl}</span>
  </div>
  <div class="row"><span class="k">CBDR</span><span class="v v-mt">${fmt(s.cbdr_low)} – ${fmt(s.cbdr_high)} <span class="v-hl">(%${pct(s.cbdr_low,s.cbdr_high)})</span></span></div>
  <div class="row"><span class="k">BIAS</span><span class="v">${biasHtml(s)}</span></div>
  <div class="row"><span class="k">SWEEP</span><span class="v">${swHtml(s)}</span></div>
  <div class="row"><span class="k">FVG</span><span class="v">${fvgHtml(s)}</span></div>
  <div class="sep"></div>
  <div class="row"><span class="k">ENTRY</span><span class="v">${entryHtml(t)}</span></div>
  <div class="row"><span class="k">PREM/DISC</span><span class="v">${premDiscHtml(s)}</span></div>
  <div class="row"><span class="k">SL</span><span class="v">${t?`<span class="v-sl">${fmt(t.sl)}</span>`:'<span class="v-mt">—</span>'}</span></div>
  <div class="row"><span class="k">TP</span><span class="v">${t?`<span class="v-tp">${fmt(t.tp)}</span>`:'<span class="v-mt">—</span>'}</span></div>
  <div class="row"><span class="k">FVG-SL MES.</span><span class="v">${fvgSlHtml(t)}</span></div>
  ${upnlRow}
  <div class="tags">${tags.join('')}</div>
  <div class="bar"><div class="dot" style="left:${dotLeft(s)}%"></div></div>
</div>`;
}

function render(data){
  const syms=data.symbols||{};

  /* Stats */
  $('sab').textContent=data.available_balance!=null?'$'+Number(data.available_balance).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}):'—';
  const totalEq=data.wallet_balance!=null?data.wallet_balance+(data.total_upnl||0):null;
  $('sb').textContent=totalEq!=null?'$'+Number(totalEq).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}):'—';
  $('so').textContent=Object.values(syms).filter(s=>s.active_trade).length;
  $('st').textContent=Object.values(syms).reduce((a,s)=>a+(s.trades_today||0),0);
  const ue=$('su');
  if(data.total_upnl!=null){ue.textContent=fp(data.total_upnl);ue.className='stat-value '+(data.total_upnl>=0?'v-gr':'v-rd');}
  else{ue.textContent='—';ue.className='stat-value v-mt';}

  /* Sort by priority and render grid */
  const sorted=Object.entries(syms).sort(([,a],[,b])=>priority(a)-priority(b));
  $('cg').innerHTML=sorted.map(([n,s])=>buildCard(n,s)).join('');

  $('ua').textContent='Son guncelleme: '+(data.updated_at?new Date(data.updated_at).toLocaleTimeString('tr-TR'):'—')+' · 15s';
  $('lb').className='badge-live';$('lb').textContent='CANLI';
  $('eb').style.display='none';
}

async function poll(){
  try{
    const r=await fetch(SF+'?t='+Date.now());
    if(!r.ok) throw 0;
    render(await r.json());
  }catch{
    $('lb').className='badge-err';$('lb').textContent='BAGLANTI YOK';
    $('eb').style.display='block';
    $('ua').textContent='live_state.json okunamadi';
  }
}
poll();setInterval(poll,PM);
</script>
</body>
</html>
