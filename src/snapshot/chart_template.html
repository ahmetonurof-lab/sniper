<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<title>Snapshot</title>
<style>
html,body{width:100%;height:100%}
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;font-family:'Courier New',monospace;color:#c9d1d9;overflow:auto}
#wrap{width:100%;max-width:1280px;aspect-ratio:1280/720;min-height:360px;position:relative;background:#0d1117;margin:0 auto}
#chart{position:absolute;top:40px;left:0;right:0;bottom:0}
#overlay-canvas{position:absolute;top:40px;left:0;width:100%;height:calc(100% - 40px);pointer-events:none;z-index:10}

#header{position:absolute;top:0;left:0;right:0;height:40px;
  background:#0d1117;border-bottom:1px solid #21262d;
  display:flex;align-items:center;padding:0 14px;gap:14px;z-index:20}
.sym{font-size:14px;font-weight:700;color:#f0f6fc;letter-spacing:.5px}
.badge{font-size:10px;padding:2px 7px;border-radius:3px;font-weight:700;letter-spacing:.4px}
.b-long   {background:#0f2d0f;color:#3fb950;border:1px solid #238636}
.b-short  {background:#2d1a0f;color:#ffa657;border:1px solid #d29922}
.b-sl     {background:#2d0f0f;color:#f85149;border:1px solid #da3633}
.b-tp     {background:#0f2d0f;color:#3fb950;border:1px solid #238636}
.b-timeout{background:#1a1a2d;color:#79c0ff;border:1px solid #388bfd}
.sep{color:#30363d;font-size:10px}
.meta{color:#8b949e;font-size:11px}
.pnl-pos{color:#3fb950;font-size:12px;font-weight:700}
.pnl-neg{color:#f85149;font-size:12px;font-weight:700}

#legend{position:absolute;top:54px;left:14px;
  background:rgba(13,17,23,0.93);border:1px solid #21262d;
  border-radius:6px;padding:10px 13px;z-index:20;min-width:210px}
.leg-row{display:flex;justify-content:space-between;align-items:center;
  gap:20px;font-size:10.5px;padding:2.5px 0}
.leg-label{color:#8b949e}
.leg-val{font-weight:700;font-family:'Courier New',monospace;text-align:right}
.leg-div{border-top:1px solid #21262d;margin:5px 0}
.c-entry{color:#58a6ff}.c-exit{color:#f85149}
.c-sl{color:#f85149}.c-tp{color:#3fb950}
.c-cbdr{color:#d2a8ff}.c-fvg{color:#ffa657}
.c-sweep{color:#79c0ff}

#tradebadge{position:absolute;bottom:14px;right:14px;
  border-radius:6px;padding:8px 14px;z-index:20;text-align:right}
#tradebadge.loss{background:#2d0f0f;border:1px solid #da3633}
#tradebadge.win {background:#0f2d0f;border:1px solid #238636}
#tradebadge .tb-sym{font-size:11px;color:#8b949e;margin-bottom:2px}
#tradebadge .tb-pnl{font-size:16px;font-weight:700}
#tradebadge .tb-reason{font-size:10px;opacity:.75;margin-top:1px}
.loss .tb-pnl,.loss .tb-reason{color:#f85149}
.win  .tb-pnl,.win  .tb-reason{color:#3fb950}
</style>
</head>
<body>
<div id="wrap">
  <div id="header" data-rendered="0"></div>
  <div id="chart"></div>
  <canvas id="overlay-canvas" width="1280" height="680"></canvas>
  <div id="legend"></div>
  <div id="tradebadge"></div>
</div>

<script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
<script>
const DATA = __DATA__;

// ── Helpers ───────────────────────────────────────────────────────────────
const fmt    = n => n == null ? '—' : Number(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:4});
const pnlFmt = n => (n >= 0 ? '+' : '') + Number(n).toFixed(2) + '%';
const isWin  = (DATA.pnl ?? 0) >= 0;
const side   = (DATA.side || 'long').toUpperCase();
const reason = (DATA.exitReason || '').toUpperCase();
const isBullFvg = d => d.fvgDirection === 'bullish';

// ── Header ────────────────────────────────────────────────────────────────
const reasonClass = reason === 'SL' ? 'b-sl' : reason === 'TP' ? 'b-tp' : 'b-timeout';
const sideClass   = side === 'SHORT' ? 'b-short' : 'b-long';
const exitTs      = DATA.candles?.[DATA.exitBar]?.time;
const dtStr       = exitTs
  ? new Date(exitTs*1000).toISOString().replace('T',' ').slice(0,16)+' UTC'
  : '';

document.getElementById('header').innerHTML = `
  <span class="sym">${DATA.sym||'UNKNOWN'}</span>
  <span class="badge ${sideClass}">${side}</span>
  <span class="badge ${reasonClass}">${reason||'EXIT'}</span>
  <span class="sep">│</span><span class="meta">15m</span>
  <span class="sep">·</span><span class="meta">${dtStr}</span>
  <span class="sep">│</span><span class="meta">PnL:</span>
  <span class="${isWin?'pnl-pos':'pnl-neg'}">${pnlFmt(DATA.pnl??0)}</span>
  <span class="sep">│</span>
  <span class="meta">Trailing: ${DATA.trailingCount??0}</span>
  <span class="sep">·</span>
  <span class="meta">Sweep: ${DATA.fvgDirection
    ? DATA.fvgDirection.charAt(0).toUpperCase()+DATA.fvgDirection.slice(1)
    : '—'}</span>
`;

// ── Legend ────────────────────────────────────────────────────────────────
document.getElementById('legend').innerHTML = `
  <div class="leg-row"><span class="leg-label">Entry</span>      <span class="leg-val c-entry">${fmt(DATA.entryPrice)}</span></div>
  <div class="leg-row"><span class="leg-label">Exit</span>       <span class="leg-val c-exit">${fmt(DATA.exitPrice)}</span></div>
  <div class="leg-row"><span class="leg-label">SL</span>         <span class="leg-val c-sl">${fmt(DATA.slPrice)}</span></div>
  <div class="leg-row"><span class="leg-label">TP</span>         <span class="leg-val c-tp">${fmt(DATA.tpPrice)}</span></div>
  <div class="leg-div"></div>
  <div class="leg-row"><span class="leg-label">CBDR High</span>  <span class="leg-val c-cbdr">${fmt(DATA.cbdrHigh)}</span></div>
  <div class="leg-row"><span class="leg-label">CBDR Low</span>   <span class="leg-val c-cbdr">${fmt(DATA.cbdrLow)}</span></div>
  <div class="leg-div"></div>
  <div class="leg-row"><span class="leg-label">FVG Top</span>    <span class="leg-val c-fvg">${fmt(DATA.fvgTop)}</span></div>
  <div class="leg-row"><span class="leg-label">FVG Bottom</span> <span class="leg-val c-fvg">${fmt(DATA.fvgBottom)}</span></div>
  <div class="leg-div"></div>
  <div class="leg-row"><span class="leg-label">Sweep Level</span><span class="leg-val c-sweep">${fmt(DATA.sweepLevel)}</span></div>
`;

// ── Trade badge ───────────────────────────────────────────────────────────
const badge = document.getElementById('tradebadge');
badge.className = isWin ? 'win' : 'loss';
badge.innerHTML = `
  <div class="tb-sym">${DATA.sym||'UNKNOWN'} · ${side} · 15m</div>
  <div class="tb-pnl">${pnlFmt(DATA.pnl??0)}</div>
  <div class="tb-reason">${reason==='SL'?'Stop Loss Hit':reason==='TP'?'Take Profit Hit':reason||'Exit'}</div>
`;

// ── Chart kurulum ─────────────────────────────────────────────────────────
const wrapEl = document.getElementById('wrap');
const chartEl = document.getElementById('chart');
const canvasEl = document.getElementById('overlay-canvas');

function getChartSize() {
  const r = chartEl.getBoundingClientRect();
  return { w: Math.max(1, Math.round(r.width)), h: Math.max(1, Math.round(r.height)) };
}
let { w: CHART_W, h: CHART_H } = getChartSize();

const chart = LightweightCharts.createChart(document.getElementById('chart'), {
  width: CHART_W,
  height: CHART_H,
  layout: { background:{color:'#0d1117'}, textColor:'#8b949e' },
  grid: { vertLines:{color:'#161b22'}, horzLines:{color:'#161b22'} },
  crosshair: {
    mode: LightweightCharts.CrosshairMode.Normal,
    vertLine:{color:'#3d444d',width:1,style:0},
    horzLine:{color:'#3d444d',width:1,style:0},
  },
  rightPriceScale: {
    borderColor: '#21262d',
    scaleMargins: {top:0.06, bottom:0.06},
    autoScale: true,
  },
  timeScale: {
    borderColor: '#21262d',
    timeVisible: true,
    secondsVisible: false,
    tickMarkFormatter: (t) => {
      const d = new Date(t * 1000);
      return d.getUTCHours().toString().padStart(2,'0') + ':' +
             d.getUTCMinutes().toString().padStart(2,'0');
    },
  },
  handleScroll: true,
  handleScale: true,
});

// ── Candlestick ───────────────────────────────────────────────────────────
const cs = chart.addCandlestickSeries({
  upColor: '#3fb950', downColor: '#f85149',
  borderUpColor: '#3fb950', borderDownColor: '#f85149',
  wickUpColor: '#57a64a', wickDownColor: '#c0392b',
});
cs.setData(DATA.candles);

// Python tarafında hesaplanan priceMin/priceMax varsa, sabit range kullan
// (CBDR/FVG/Sweep gibi tüm seviyeleri garantili kapsar)
// NOT: lightweight-charts'ta chart.priceScale().setVisiblePriceRange() DİYE BİR API YOK
// (bu sadece TradingView'in ayrı/ücretli Charting Library ürününde var).
// Doğru yöntem: autoScale açık kalır, autoscaleInfoProvider sabit min/max döndürür.
if (DATA.priceMin != null && DATA.priceMax != null) {
  cs.applyOptions({
    autoscaleInfoProvider: () => ({
      priceRange: { minValue: DATA.priceMin, maxValue: DATA.priceMax },
    }),
  });
}

// ── Markers ───────────────────────────────────────────────────────────────
const markers = [];
if (DATA.fvgBarIndex != null && DATA.fvgBarIndex >= 0 && DATA.candles[DATA.fvgBarIndex]) {
  markers.push({
    time: DATA.candles[DATA.fvgBarIndex].time,
    position: isBullFvg(DATA) ? 'belowBar' : 'aboveBar',
    color:'#ffa657', shape:'circle',
    text:`FVG ${isBullFvg(DATA)?'▲':'▼'}`, size:2,
  });
}

// Sweep bar: snapshot.py bar index göndermiyor, bu yüzden sweepLevel'a
// ilk değen barı candle verisinden buluyoruz (high/low aralığı sweepLevel'ı kapsayan ilk bar).
function findSweepBarIndex(candles, sweepLevel) {
  if (sweepLevel == null) return -1;
  for (let i = 0; i < candles.length; i++) {
    const c = candles[i];
    if (c.low <= sweepLevel && sweepLevel <= c.high) return i;
  }
  return -1;
}
const sweepBarIndex = findSweepBarIndex(DATA.candles, DATA.sweepLevel);
if (sweepBarIndex >= 0 && DATA.candles[sweepBarIndex]) {
  const sweepBull = DATA.fvgDirection === 'bullish';
  markers.push({
    time: DATA.candles[sweepBarIndex].time,
    position: sweepBull ? 'belowBar' : 'aboveBar',
    color:'#79c0ff',
    shape: sweepBull ? 'arrowUp' : 'arrowDown',
    text:`Sweep ${fmt(DATA.sweepLevel)}`, size:2,
  });
}

if (DATA.entryBar != null && DATA.candles[DATA.entryBar]) {
  markers.push({
    time: DATA.candles[DATA.entryBar].time,
    position: side==='SHORT'?'aboveBar':'belowBar',
    color:'#58a6ff',
    shape: side==='SHORT'?'arrowDown':'arrowUp',
    text:`${side==='SHORT'?'▼':'▲'} ${side}  ${fmt(DATA.entryPrice)}`,
    size:2,
  });
}
if (DATA.exitBar != null && DATA.candles[DATA.exitBar]) {
  markers.push({
    time: DATA.candles[DATA.exitBar].time,
    position: side==='SHORT'?'belowBar':'aboveBar',
    color: isWin?'#3fb950':'#f85149',
    shape: side==='SHORT'?'arrowUp':'arrowDown',
    text:`✕ ${reason}  ${fmt(DATA.exitPrice)}`,
    size:2,
  });
}
markers.sort((a,b) => a.time - b.time);
cs.setMarkers(markers);

chart.timeScale().fitContent();

// ── CANVAS OVERLAY — price→pixel dönüşümü ────────────────────────────────
// LWC'nin iç coordinate API'sini kullanarak price ve time → pixel koordinatına çeviriyoruz.
// Bu yöntem LWC 4.2'de garanti çalışır.

function sizeCanvas() {
  const r = chartEl.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  canvasEl.width  = Math.max(1, Math.round(r.width * dpr));
  canvasEl.height = Math.max(1, Math.round(r.height * dpr));
  const ctx0 = canvasEl.getContext('2d');
  ctx0.setTransform(dpr, 0, 0, dpr, 0, 0);
}
sizeCanvas();

function drawOverlays(retryCount) {
  retryCount = retryCount || 0;
  const canvas = document.getElementById('overlay-canvas');
  const ctx    = canvas.getContext('2d');
  const sizeNow = getChartSize();
  CHART_W = sizeNow.w; CHART_H = sizeNow.h;
  // canvas.width/height are physical pixels (already scaled by DPR in sizeCanvas).
  // ctx currently has the DPR transform applied — clear in CSS-pixel space using that same transform.
  ctx.clearRect(0, 0, CHART_W, CHART_H);

  // LWC'den koordinat dönüşümü
  const priceToY = price => {
    try { return cs.priceToCoordinate(price); } catch(e) { return null; }
  };
  const timeToX = time => {
    try { return chart.timeScale().timeToCoordinate(time); } catch(e) { return null; }
  };

  const firstTime = DATA.candles[0].time;
  const lastTime  = DATA.candles[DATA.candles.length - 1].time;

  const x0 = timeToX(firstTime);
  const x1 = timeToX(lastTime);

  console.log('[NEXUS overlay] try', retryCount, 'CHART_W', CHART_W, 'CHART_H', CHART_H, 'x0', x0, 'x1', x1,
    'cbdrY-high', priceToY(DATA.cbdrHigh), 'cbdrY-low', priceToY(DATA.cbdrLow));

  if (x0 == null || x1 == null) {
    if (retryCount < 10) {
      setTimeout(() => drawOverlays(retryCount + 1), 100);
    } else {
      console.warn('[NEXUS overlay] gave up after 10 retries — timeToX kept returning null');
    }
    return;
  }

  // ── Yardımcı: yatay çizgi (etiketsiz — bilgi sabit legend panelinde) ──
  function hLine(price, color, lineWidth, dash) {
    const y = priceToY(price);
    if (y == null || y < 0 || y > CHART_H) return;
    ctx.save();
    ctx.strokeStyle = color;
    ctx.lineWidth   = lineWidth;
    ctx.setLineDash(dash || []);
    ctx.globalAlpha = 1;
    ctx.beginPath();
    ctx.moveTo(x0, y);
    ctx.lineTo(x1, y);
    ctx.stroke();
    ctx.restore();
  }

  // ── Yardımcı: dolu bant (etiketsiz) ──────────────────────────────────
  function band(priceHigh, priceLow, fillColor, strokeColor) {
    const yH = priceToY(priceHigh);
    const yL = priceToY(priceLow);
    if (yH == null || yL == null) return;
    const top    = Math.min(yH, yL);
    const bottom = Math.max(yH, yL);
    ctx.save();
    ctx.fillStyle   = fillColor;
    ctx.globalAlpha = 1;
    ctx.fillRect(x0, top, x1 - x0, bottom - top);
    ctx.strokeStyle = strokeColor;
    ctx.lineWidth   = 1.5;
    ctx.setLineDash([]);
    ctx.globalAlpha = 1;
    ctx.beginPath(); ctx.moveTo(x0, yH); ctx.lineTo(x1, yH); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x0, yL); ctx.lineTo(x1, yL); ctx.stroke();
    ctx.restore();
  }

  // ── Yardımcı: belirli bar aralığında yatay çizgi (etiketsiz) ─────────
  function rangedHLine(price, fromBar, toBar, color, lineWidth, dash) {
    const y   = priceToY(price);
    if (y == null || y < 0 || y > CHART_H) return;
    const xA  = timeToX(DATA.candles[Math.max(0, fromBar)].time);
    const xB  = timeToX(DATA.candles[Math.min(DATA.candles.length-1, toBar)].time);
    if (xA == null || xB == null) return;
    ctx.save();
    ctx.strokeStyle = color;
    ctx.lineWidth   = lineWidth;
    ctx.setLineDash(dash || []);
    ctx.globalAlpha = 1;
    ctx.beginPath();
    ctx.moveTo(xA, y);
    ctx.lineTo(xB, y);
    ctx.stroke();
    ctx.restore();
  }

  // ════════════════════════════════════════════════════════════════
  // 1. CBDR BAND
  // ════════════════════════════════════════════════════════════════
  if (DATA.cbdrHigh != null && DATA.cbdrLow != null) {
    band(DATA.cbdrHigh, DATA.cbdrLow,
      'rgba(210,168,255,0.10)', 'rgba(210,168,255,0.85)');
  }

  // ════════════════════════════════════════════════════════════════
  // 2. FVG BAND
  // ════════════════════════════════════════════════════════════════
  if (DATA.fvgTop != null && DATA.fvgBottom != null) {
    const isBull   = DATA.fvgDirection === 'bullish';
    const fvgFill  = isBull ? 'rgba(63,185,80,0.12)' : 'rgba(255,166,87,0.12)';
    const fvgStroke= isBull ? 'rgba(63,185,80,0.9)'  : 'rgba(255,166,87,0.9)';
    band(DATA.fvgTop, DATA.fvgBottom, fvgFill, fvgStroke);

    // CE — Consequent Encroachment (orta nokta)
    const ce = (DATA.fvgTop + DATA.fvgBottom) / 2;
    hLine(ce, isBull ? 'rgba(63,185,80,0.4)' : 'rgba(255,166,87,0.4)', 1, [4,4]);
  }

  // ════════════════════════════════════════════════════════════════
  // 3. SWEEP LEVEL
  // ════════════════════════════════════════════════════════════════
  if (DATA.sweepLevel != null) {
    hLine(DATA.sweepLevel, 'rgba(121,192,255,0.9)', 2, [6,3]);
  }

  // ════════════════════════════════════════════════════════════════
  // 4. SL — entry'den itibaren 4 mumluk kısa çizgi
  // ════════════════════════════════════════════════════════════════
  const SL_TP_BAR_SPAN = 4;
  if (DATA.slPrice != null && DATA.entryBar != null) {
    rangedHLine(DATA.slPrice, DATA.entryBar, DATA.entryBar + SL_TP_BAR_SPAN,
      'rgba(248,81,73,1)', 2, [6,4]);
  }

  // ════════════════════════════════════════════════════════════════
  // 5. TP — entry'den itibaren 4 mumluk kısa çizgi
  // ════════════════════════════════════════════════════════════════
  if (DATA.tpPrice != null && DATA.entryBar != null) {
    rangedHLine(DATA.tpPrice, DATA.entryBar, DATA.entryBar + SL_TP_BAR_SPAN,
      'rgba(63,185,80,1)', 2, [6,4]);
  }

  // ════════════════════════════════════════════════════════════════
  // 6. ENTRY — long horizontal line from entryBar
  // ════════════════════════════════════════════════════════════════
  if (DATA.entryPrice != null && DATA.entryBar != null) {
    rangedHLine(DATA.entryPrice, DATA.entryBar, DATA.entryBar + SL_TP_BAR_SPAN,
      'rgba(88,166,255,1)', 2, []);
  }

  // ════════════════════════════════════════════════════════════════
  // 7. TRAIL STEPS
  // ════════════════════════════════════════════════════════════════
  (DATA.trailSteps || []).forEach((step) => {
    if (!step.sl) return;
    rangedHLine(step.sl, step.bar, step.bar + SL_TP_BAR_SPAN,
      'rgba(248,81,73,0.45)', 1, [3,3]);
  });
}

// ── fitContent sonrası kısa gecikmeyle çiz ────────────────────────────────
// LWC koordinatları ancak render tamamlandıktan sonra hazır olur.
chart.timeScale().fitContent();
setTimeout(drawOverlays, 150);

// ── Responsive: konteyner boyutu değişince chart + overlay yeniden çiz ────
let resizeTimer = null;
function handleResize() {
  const { w, h } = getChartSize();
  if (w < 10 || h < 10) return;
  chart.resize(w, h);
  sizeCanvas();
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(drawOverlays, 60);
}
if (window.ResizeObserver) {
  new ResizeObserver(handleResize).observe(wrapEl);
} else {
  window.addEventListener('resize', handleResize);
}

// ── Pan/Zoom: kullanıcı mouse wheel veya sürükleme ile grafiği hareket
// ettirdiğinde konteyner boyutu DEĞİŞMEZ, bu yüzden ResizeObserver tetiklenmez.
// LWC'nin kendi visible-range event'lerine abone olup overlay'i SENKRON yeniden
// çiziyoruz (requestAnimationFrame ile geciktirmek görünür "esneme/zıplama" yaratıyordu).
chart.timeScale().subscribeVisibleTimeRangeChange(() => drawOverlays());
chart.timeScale().subscribeVisibleLogicalRangeChange(() => drawOverlays());

// ── Playwright render sinyali ─────────────────────────────────────────────
setTimeout(() => {
  document.getElementById('header').dataset.rendered = '1';
}, 300);
</script>
</body>
</html>
